services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: movie_shooting
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  app:
    build: .
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - uploads:/app/uploads
    depends_on:
      - db
    restart: unless-stopped

volumes:
  postgres_data:
  uploads:
